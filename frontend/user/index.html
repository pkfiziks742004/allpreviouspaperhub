<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="dynamic-mobile-title" name="apple-mobile-web-app-title" content="All Previous Paper Hub" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="All Previous Paper Hub - Previous year papers, notes, syllabus, and exam resources." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="All Previous Paper Hub" />
    <meta property="og:title" content="All Previous Paper Hub" />
    <meta property="og:description" content="Previous year papers, notes, syllabus, and exam resources." />
    <meta property="og:url" content="https://www.allpreviouspaperhub.in/" />
    <meta property="og:image" content="https://api.allpreviouspaperhub.in/og-image" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="All Previous Paper Hub" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="All Previous Paper Hub" />
    <meta name="twitter:description" content="Previous year papers, notes, syllabus, and exam resources." />
    <meta name="twitter:image" content="https://api.allpreviouspaperhub.in/og-image" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="dns-prefetch" href="//api.allpreviouspaperhub.in" />
    <link rel="preconnect" href="https://api.allpreviouspaperhub.in" crossorigin />
    <link rel="dns-prefetch" href="//res.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="canonical" href="https://www.allpreviouspaperhub.in/" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "All Previous Paper Hub",
        "url": "https://www.allpreviouspaperhub.in/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.allpreviouspaperhub.in/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link id="dynamic-shortcut-icon" rel="shortcut icon" href="/favicon.svg" />
    <link id="dynamic-apple-touch-icon" rel="apple-touch-icon" href="/favicon.svg" />
    <script>
      (function () {
        var bootstrapDataKey = "__APP_BOOTSTRAP_DATA__";
        var bootstrapPromisesKey = "__APP_BOOTSTRAP_PROMISES__";
        var host = window.location.hostname || "localhost";
        var protocol = window.location.protocol || "http:";
        var localHosts = { localhost: true, "127.0.0.1": true, "::1": true };
        var apiBase = localHosts[host] ? protocol + "//" + host + ":5000" : "https://api.allpreviouspaperhub.in";

        window[bootstrapDataKey] = window[bootstrapDataKey] || {};
        window[bootstrapPromisesKey] = window[bootstrapPromisesKey] || {};

        function prime(key, url) {
          if (window[bootstrapPromisesKey][key]) return;
          window[bootstrapPromisesKey][key] = fetch(url, { mode: "cors" })
            .then(function (response) {
              if (!response.ok) return null;
              return response.json();
            })
            .then(function (data) {
              if (data != null) {
                window[bootstrapDataKey][key] = data;
              }

              return data;
            })
            .catch(function () {
              return null;
            });
        }

        prime("settings", apiBase + "/api/settings");
        prime("universities", apiBase + "/api/universities");

        try {
          var cachedTitle = localStorage.getItem("user_page_title_cache");
          var cachedDescription = localStorage.getItem("user_seo_description_cache");
          if (cachedTitle && cachedTitle.trim()) {
            document.title = cachedTitle.trim();
            var mobileTitle = document.getElementById("dynamic-mobile-title");
            if (mobileTitle) mobileTitle.setAttribute("content", cachedTitle.trim());
          }
          if (cachedDescription && cachedDescription.trim()) {
            var keys = [
              { selector: "meta[name='description']", attr: "name", key: "description" },
              { selector: "meta[property='og:description']", attr: "property", key: "og:description" },
              { selector: "meta[name='twitter:description']", attr: "name", key: "twitter:description" }
            ];
            keys.forEach(function (entry) {
              var tag = document.querySelector(entry.selector);
              if (!tag) {
                tag = document.createElement("meta");
                tag.setAttribute(entry.attr, entry.key);
                document.head.appendChild(tag);
              }
              tag.setAttribute("content", cachedDescription.trim());
            });
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        var retryKey = "user_frontend_chunk_retry";

        function hasChunkFailure(message) {
          var text = String(message || "");
          return (
            text.indexOf("Failed to fetch dynamically imported module") !== -1 ||
            text.indexOf("Importing a module script failed") !== -1 ||
            text.indexOf("Unable to preload CSS") !== -1
          );
        }

        function recoverFromChunkFailure() {
          try {
            if (sessionStorage.getItem(retryKey) === "1") return;
            sessionStorage.setItem(retryKey, "1");
            var url = new URL(window.location.href);
            url.searchParams.set("_fresh", String(Date.now()));
            window.location.replace(url.toString());
          } catch (e) {
            window.location.reload();
          }
        }

        window.addEventListener("vite:preloadError", function (event) {
          recoverFromChunkFailure();
          if (event && typeof event.preventDefault === "function") {
            event.preventDefault();
          }
        });

        window.addEventListener("unhandledrejection", function (event) {
          if (hasChunkFailure(event && event.reason && event.reason.message ? event.reason.message : event && event.reason)) {
            recoverFromChunkFailure();
          }
        });
      })();
    </script>
    <title>All Previous Paper Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
